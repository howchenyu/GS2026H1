  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;div id=&quot;business-analysis-dashboard&quot;&gt;
  &lt;style&gt;
    #business-analysis-dashboard {

      display: grid;
      gap: 24px;
    }
    #business-analysis-dashboard * { box-sizing: border-box; }
    #business-analysis-dashboard .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      color: var(--muted-foreground);
    }
    #business-analysis-dashboard section {
      display: grid;
      gap: 12px;
    }
    #business-analysis-dashboard .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    #business-analysis-dashboard .section-head h2,
    #business-analysis-dashboard .section-head p { margin: 0; }
    #business-analysis-dashboard .stat-context { color: var(--muted-foreground); }
    #business-analysis-dashboard .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      color: var(--muted-foreground);
    }
    #business-analysis-dashboard .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

      height: 8px;
      border-radius: 2px;
      display: inline-block;
    }
    #business-analysis-dashboard .bu-list,
    #business-analysis-dashboard .customer-list {
      display: grid;
      gap: 10px;
    }
    #business-analysis-dashboard .bu-row {
      display: grid;
      grid-template-columns: minmax(116px, 0.8fr) minmax(220px, 2.8fr) minmax(104px, 0.8fr);
      gap: 12px;
      align-items: center;
    }
    #business-analysis-dashboard .bu-label { display: grid; gap: 2px; }
    #business-analysis-dashboard .bar-pair { display: grid; gap: 5px; }
    #business-analysis-dashboard .bar-track,
    #business-analysis-dashboard .customer-track,
    #business-analysis-dashboard .year-track {
      height: 12px;
      background: color-mix(in srgb, var(--border) 55%, transparent);
      border-radius: 999px;
      overflow: hidden;
    }
    #business-analysis-dashboard .bar-fill,
    #business-analysis-dashboard .customer-fill,
    #business-analysis-dashboard .year-fill {
      height: 100%;
      border-radius: inherit;
    }
    #business-analysis-dashboard .bu-values {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    #business-analysis-dashboard .bu-values strong { display: block; font-weight: 500; }
    #business-analysis-dashboard .bu-values span { color: var(--muted-foreground); }
    #business-analysis-dashboard .customer-row {
      display: grid;
      grid-template-columns: minmax(180px, 1.45fr) minmax(180px, 2.5fr) minmax(92px, 0.7fr);
      gap: 12px;
      align-items: center;
    }
    #business-analysis-dashboard .customer-value {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    #business-analysis-dashboard .year-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }
    #business-analysis-dashboard .year-item { display: grid; gap: 8px; }
    #business-analysis-dashboard .year-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    #business-analysis-dashboard .year-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      color: var(--muted-foreground);
    }
    #business-analysis-dashboard .year-metrics strong {
      color: var(--foreground);
      font-weight: 500;
      display: block;
    }
    #business-analysis-dashboard .scatter-wrap { width: 100%; overflow: hidden; }
    #business-analysis-dashboard .project-scatter { width: 100%; height: auto; display: block; }
    #business-analysis-dashboard .project-scatter .grid-line { stroke: var(--border); stroke-width: 1; }
    #business-analysis-dashboard .project-scatter .axis-line { stroke: var(--muted-foreground); stroke-width: 1; }
    #business-analysis-dashboard .project-scatter .tick,
    #business-analysis-dashboard .project-scatter .axis-label,
    #business-analysis-dashboard .project-scatter .point-label { fill: var(--muted-foreground); }

    #business-analysis-dashboard .project-scatter .zero-line { stroke: var(--destructive); stroke-width: 1; }

    #business-analysis-dashboard .split {

      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 24px;
      align-items: start;

    #business-analysis-dashboard .maintenance-total {
      color: var(--destructive);
      font-variant-numeric: tabular-nums;
    }

      padding-left: 12px;
      color: var(--foreground);

    #business-analysis-dashboard .bridge {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      text-align: center;
    }
    #business-analysis-dashboard .bridge-step {
      display: grid;
      gap: 3px;
      padding: 10px 0;
      border-bottom: 2px solid var(--border);

    #business-analysis-dashboard .table td.text-end { font-variant-numeric: tabular-nums; }
    #business-analysis-dashboard .chart-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: end;
    }

    #business-analysis-dashboard .chart-shell {

      min-height: 220px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
    }
    #business-analysis-dashboard .chart-rows { display: grid; gap: 10px; }
    #business-analysis-dashboard .chart-row-button {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(108px, .8fr) minmax(220px, 3fr) minmax(105px, .8fr);
      gap: 12px;
      align-items: center;
      padding: 4px;
      border: 0;
      border-radius: calc(var(--radius) * .7);
      background: transparent;
      color: var(--foreground);
      text-align: left;
      cursor: pointer;
    }
    #business-analysis-dashboard .chart-row-button:hover,
    #business-analysis-dashboard .chart-row-button:focus-visible { background: var(--muted); outline: none; }
    #business-analysis-dashboard .chart-bar-track {
      height: 22px;
      background: color-mix(in srgb, var(--border) 55%, transparent);
      border-radius: 5px;
      overflow: hidden;
    }
    #business-analysis-dashboard .chart-bar-fill {
      height: 100%;
      min-width: 2px;
      border-radius: inherit;
      transition: width 260ms ease, opacity 160ms ease;
    }
    #business-analysis-dashboard .chart-row-value { text-align: right; font-variant-numeric: tabular-nums; }
    #business-analysis-dashboard .chart-tooltip {
      position: fixed;
      z-index: 20;
      max-width: 320px;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--popover);
      color: var(--popover-foreground);
      box-shadow: var(--shadow-md);
      pointer-events: none;
      opacity: 0;
      transform: translate(10px, 10px);
      transition: opacity 100ms ease;
    }

    #business-analysis-dashboard .chart-hint { margin: 0; color: var(--muted-foreground); }
    #business-analysis-dashboard .project-scatter .point { cursor: pointer; transition: opacity 120ms ease, r 120ms ease; }

    @media (max-width: 640px) {

      #business-analysis-dashboard .chart-row-button { grid-template-columns: 1fr; gap: 5px; }

    }
